<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Sanctuary - Study Session</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/study.css">
</head>
<body>

<!-- Hamburger Button -->
<div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- Dashboard Container (wraps sidebar + content) -->
<div class="dashboard-container">
    <!-- Sidebar will be loaded here by JavaScript -->

    <!-- Main Content -->
    <div class="study-container" id="studyContainer">
        <div class="study-header">
            <div class="set-title" id="setTitle">Loading...</div>
        </div>

        <div id="studyArea">
            <div class="progress-section">
                <div class="progress-label">PROGRESS</div>
                <div class="progress-numbers">
                    <span id="currentCardNum">0</span> / <span id="totalCards">0</span> Cards
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
            </div>

            <div class="flashcard" id="flashcard" onclick="flipCard()">
                <div class="card-label" id="cardLabel">TERM</div>
                <div class="card-content">
                    <div class="card-question" id="questionText">Click to reveal answer</div>
                    <div class="card-answer" id="answerText"></div>
                </div>
                <div class="flip-hint" id="flipHint"> Click card or press SPACE to flip </div>
            </div>

            <div class="action-section">
                <button class="action-btn" onclick="previousCard()"> PREV</button>
                <button class="action-btn flip-btn" onclick="flipCard()"> FLIP CARD</button>
                <button class="action-btn" onclick="nextCard()">NEXT </button>
            </div>

            <div class="keyboard-hint">
                 <span>←</span> Previous &nbsp;&nbsp; <span>→</span> Next &nbsp;&nbsp; <span>SPACE</span> Flip &nbsp;&nbsp; <span>F</span> Flip Back
            </div>
        </div>

        <div id="completionScreen" class="completion-screen hidden">
            <h2> Congratulations! </h2>
            <p>You've completed all flashcards in this set!</p>
            <p id="completionStats"></p>
            <button class="restart-btn" onclick="restartSession()"> Study Again</button>
        </div>
    </div>
</div>

<script src="js/common.js"></script>
<script src="js/study.js"></script>
</body>
</html>
